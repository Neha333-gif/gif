name: Flutter APK Build

on:
  push:
    branches:
      - main
      - gh-pages
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      # Checkout your repo
      - name: Checkout source
        uses: actions/checkout@v4

      # Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'   # match your SDK version

      # Create a fresh supported Flutter project scaffold
      - name: Create scaffold
        run: flutter create -t app fixed_app

      # Copy your code and pubspec into the scaffold
      - name: Copy source files
        run: |
          cp -r lib fixed_app/
          cp pubspec.yaml fixed_app/
          if [ -d assets ]; then cp -r assets fixed_app/; fi

      # Install dependencies
      - name: Install dependencies
        run: |
          cd fixed_app
          flutter pub get

      # Build APK
      - name: Build release APK
        run: |
          cd fixed_app
          flutter build apk --release

      # Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: fixed_app/build/app/outputs/flutter-apk/app-release.apk
