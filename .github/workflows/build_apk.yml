name: Build Flutter APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Go to Flutter project
        run: cd app_quotes_flutter

      - name: Install dependencies
        run: |
          cd app_quotes_flutter
          flutter pub get

      - name: Build APK
        run: |
          cd app_quotes_flutter
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app_quotes_flutter/build/app/outputs/flutter-apk/app-release.apk
